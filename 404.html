<style>
:root{--bg:#050810;--accent:#6382ff;--accent2:#a78bfa;--cyan:#22d3ee;--text:#e8ecff;--muted:#7b84a3;--border:rgba(99,130,255,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.code{font-family:'Syne',sans-serif;font-size:clamp(80px,15vw,140px);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px}
h1{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;margin-bottom:12px}
p{color:var(--muted);font-size:15px;max-width:400px;line-height:1.7;margin-bottom:36px}
.btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;transition:transform .2s,box-shadow .2s;box-shadow:0 0 24px rgba(99,130,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(99,130,255,0.5)}
.btn-outline{border:1px solid var(--border);color:var(--text);padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:500;font-size:14px;transition:border-color .2s,background .2s}
.btn-outline:hover{border-color:var(--accent);background:rgba(99,130,255,0.08)}
.emoji{font-size:48px;margin-bottom:20px}
</style>
</head>
<body>
  <div class="emoji">🔭</div>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>This page doesn't exist or may have been moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="/" class="btn-primary">← Back to Portfolio</a>
    <a href="/blog/" class="btn-outline">Browse Blog</a>
  </div>
</body>
</html>
